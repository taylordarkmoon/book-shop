server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Обслуживание админки по пути /admin/
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Если кто-то зайдёт на корень – отдаём 404 (или редирект на /admin/)
    location / {
        return 404;
    }
}
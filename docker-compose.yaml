version: '3.8'

networks:
  bookstore-network:
    driver: bridge

# volumes:
#   postgres_auth_data:
#   postgres_catalog_data:
#   postgres_cart_data:
#   postgres_order_data:
#   redis_data:

services:
  # Reac
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: bookstore-front
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_BACK=http://localhost:8002
      # - REACT_APP_API_GATEWAY=http://localhost:8080
    depends_on:
      - api-gateway
      - back
    networks:
      - bookstore-network

    # Reac
  front-admin:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: bookstore-front-admin
    restart: unless-stopped
    ports:
      - "3004:80"
    environment:
      - REACT_APP_API_BACK=http://localhost:8002
      # - REACT_APP_API_GATEWAY=http://localhost:8080
    depends_on:
      - api-gateway
      - back
    networks:
      - bookstore-network

  # Nginx
  api-gateway:
    image: nginx:alpine
    container_name: bookstore-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - back
    networks:
      - bookstore-network

  # back
  back:
        env_file:
            - ./back/.env
        container_name: back
        restart: always
        build:
            context: ./back
            dockerfile: Dockerfile
        image: back-test
        ports:
            - 8002:8002
        volumes:
            - ./back:/back
            - '/back/node_modules'
        depends_on:
            - postgres
        networks:
            - bookstore-network
        command:  npm run start:dev

  # База данных 
  postgres:
     env_file:
              - ./back/.env
     container_name: postgres
     hostname: ${DB_HOST}
     image: postgres:16
     environment:
            PGDATA: /var/lib/postgresql/data
            APPDATA: /var/lib/postgresql/data
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASS}
     ports:
            - ${DB_PORT}:${DB_PORT}
     volumes:
            - ./postgres:/var/lib/postgresql/data
     networks:
           - bookstore-network
     restart: always

